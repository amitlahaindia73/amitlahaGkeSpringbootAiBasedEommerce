apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-order-support-service
  namespace: amitra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-order-support-service
  template:
    metadata:
      labels:
        app: ai-order-support-service
    spec:
      containers:
      - name: ai-order-support-service
        image: ${ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/ai-order-support-service:${IMAGE_TAG}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: amitra-common-config
        - secretRef:
            name: amitra-common-secrets
        startupProbe:
          httpGet:
            path: /health
            port: 8001
          failureThreshold: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 20
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 768Mi
            cpu: 1000m
---
apiVersion: v1
kind: Service
metadata:
  name: ai-order-support-service
  namespace: amitra
spec:
  type: ClusterIP
  selector:
    app: ai-order-support-service
  ports:
  - name: http
    port: 8001
    targetPort: 8001
