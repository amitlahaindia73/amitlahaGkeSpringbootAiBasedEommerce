server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: notification-service
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:mysql://mysql:3306/notification_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_APP_USER:appuser}
    password=REDACTED
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    consumer:
      group-id: ${KAFKA_NOTIFICATION_GROUP:notification-service-group}
      auto-offset-reset: earliest
    listener:
      missing-topics-fatal: false
    properties:
      spring.json.use.type.headers: false
      spring.json.trusted.packages: "*"

